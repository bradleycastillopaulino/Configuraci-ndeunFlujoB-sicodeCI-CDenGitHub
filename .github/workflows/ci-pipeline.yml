name: CI Pipeline - MaquinaCafe TDD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore MaquinaCafeTDD.sln

      - name: Build solution
        run: dotnet build MaquinaCafeTDD.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test MaquinaCafeTDD.sln --no-build --configuration Release --verbosity normal
